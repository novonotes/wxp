name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

defaults:
  run:
    shell: bash

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libx11-dev
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check --workspace --all-targets
      - name: Cargo test
        run: cargo test --workspace --lib

  webview-bridge:
    name: webview-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webview-bridge/package-lock.json
      - name: Install dependencies
        working-directory: webview-bridge
        run: npm install
      - name: Build
        working-directory: webview-bridge
        run: npm run build
