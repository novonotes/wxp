name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

defaults:
  run:
    shell: bash

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libx11-dev xvfb
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check Rust formatting
        run: |
          cargo fmt \
            --package host_window \
            --package novonotes_run_loop \
            --package run_loop_timer \
            --package wxp \
            --package wxp_clack \
            -- --check
      - name: Cargo check
        run: cargo check --workspace --all-targets
      - name: Cargo test lib
        run: cargo test --workspace --lib
      - name: Cargo test doctests
        run: cargo test --workspace --doc
      - name: Cargo test integration
        if: matrix.os != 'ubuntu-latest'
        run: cargo test --workspace --tests --examples
      - name: Cargo test integration
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a cargo test --workspace --tests --examples

  webview-bridge:
    name: webview-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/webview-bridge/package-lock.json
      - name: Install dependencies
        working-directory: packages/webview-bridge
        run: npm install
      - name: Build
        working-directory: packages/webview-bridge
        run: npm run build
